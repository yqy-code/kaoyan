<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考研错题追踪器</title>
<style>
:root {
  --bg: #0f0f13;
  --bg2: #16161d;
  --bg3: #1e1e28;
  --bg4: #252533;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #e8e8f0;
  --text2: #9090a8;
  --text3: #5a5a72;
  --accent: #7c6ff7;
  --accent2: #a39af9;
  --accent-bg: rgba(124,111,247,0.12);
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.1);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,0.1);
  --radius: 12px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* Layout */
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 220px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 24px 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  display: flex; flex-direction: column;
  z-index: 100;
}

.logo {
  padding: 0 20px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.logo-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent2);
  letter-spacing: -0.3px;
}
.logo-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

.nav-section { padding: 0 12px; margin-bottom: 8px; }
.nav-label {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0 8px;
  margin-bottom: 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text2);
  font-size: 13px;
  transition: all 0.15s;
  user-select: none;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-bg); color: var(--accent2); }
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
.nav-item .badge {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 700;
}

.main {
  margin-left: 220px;
  flex: 1;
  padding: 28px 32px;
  max-width: calc(100vw - 220px);
}

/* Header */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.page-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

/* Cards */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
}
.stat-num {
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label { font-size: 12px; color: var(--text2); }

/* Buttons */
.btn {
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.btn:hover { background: var(--bg3); border-color: var(--border2); }
.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 500;
}
.btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
.btn.sm { padding: 4px 10px; font-size: 12px; }
.btn.danger { color: var(--red); border-color: rgba(248,113,113,0.3); }
.btn.danger:hover { background: var(--red-bg); }
.btn.success { color: var(--green); border-color: rgba(74,222,128,0.3); }
.btn.success:hover { background: var(--green-bg); }

/* Form */
input, select, textarea {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  transition: border-color 0.15s;
  width: 100%;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
}
select option { background: var(--bg3); }
textarea { resize: vertical; min-height: 60px; }

/* Progress bar */
.progress-wrap { background: var(--bg4); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s ease;
}

/* Review items */
.review-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color 0.15s;
}
.review-item:hover { border-color: var(--border2); }
.review-item.done { opacity: 0.4; }

.ri-left { flex: 1; min-width: 0; }
.ri-num { font-size: 13px; font-weight: 500; }
.ri-reason { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ri-meta { font-size: 11px; color: var(--text3); margin-top: 3px; }
.ri-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* Tags */
.tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
}
.tag.due { background: var(--red-bg); color: var(--red); }
.tag.today { background: var(--amber-bg); color: var(--amber); }
.tag.soon { background: var(--blue-bg); color: var(--blue); }
.tag.stable { background: var(--green-bg); color: var(--green); }
.tag.type { background: var(--bg4); color: var(--text2); }

/* Chapter grid */
.chapter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.chapter-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.chapter-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.ch-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.ch-name { font-size: 14px; font-weight: 500; }
.ch-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.ch-count { font-size: 12px; color: var(--text2); text-align: right; }
.ch-count .num { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }

/* Detail panel */
.detail-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.back-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text2); font-size: 20px; padding: 4px;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--text); }

/* Error form */
.form-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.form-row > * { flex: 1; min-width: 120px; }

/* Heatmap */
.heatmap {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.hm-row { display: flex; align-items: center; gap: 8px; }
.hm-label { font-size: 12px; color: var(--text2); width: 140px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hm-bar-wrap { flex: 1; }
.hm-count { font-size: 12px; color: var(--text2); width: 24px; text-align: right; flex-shrink: 0; }

/* Log */
.log-item {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.log-item:last-child { border-bottom: none; }
.log-date { font-size: 11px; color: var(--text3); width: 80px; flex-shrink: 0; }
.log-text { font-size: 13px; }

/* Tabs */
.sub-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--bg3); padding: 4px; border-radius: var(--radius-sm); width: fit-content; }
.sub-tab { padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all 0.15s; border: none; background: none; font-family: inherit; }
.sub-tab.active { background: var(--bg2); color: var(--text); border: 1px solid var(--border); }

/* Modal */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 24px;
  width: 480px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

/* Export */
.export-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  font-size: 12px;
  color: var(--text2);
  font-family: monospace;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 300px;
  overflow-y: auto;
  line-height: 1.5;
}

/* Divider */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* Empty state */
.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; }
.empty-icon { font-size: 32px; margin-bottom: 8px; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border); padding: 12px 0; }
  .app { flex-direction: column; }
  .main { margin-left: 0; padding: 16px; max-width: 100%; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .sidebar .logo { display: flex; align-items: center; gap: 12px; padding-bottom: 12px; }
  .nav-section { display: flex; flex-wrap: wrap; gap: 4px; }
  .nav-item { flex-direction: column; gap: 2px; font-size: 11px; padding: 6px 10px; }
  .nav-item .icon { font-size: 18px; }
}

.section { display: none; }
.section.active { display: block; }

/* Animation */
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.2s ease; }

.mastery-excellent .progress-fill { background: var(--green); }
.mastery-good .progress-fill { background: var(--blue); }
.mastery-mid .progress-fill { background: var(--amber); }
.mastery-low .progress-fill { background: var(--red); }
.mastery-none .progress-fill { background: var(--text3); }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-title">考研错题追踪</div>
      <div class="logo-sub">二战备考系统</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">主菜单</div>
      <div class="nav-item active" onclick="nav('today')">
        <span class="icon">📅</span> 今日任务
        <span class="badge" id="today-badge" style="display:none">0</span>
      </div>
      <div class="nav-item" onclick="nav('math')">
        <span class="icon">∫</span> 数学
      </div>
      <div class="nav-item" onclick="nav('cs408')">
        <span class="icon">⊞</span> 408
      </div>
      <div class="nav-item" onclick="nav('analysis')">
        <span class="icon">📊</span> 分析
      </div>
      <div class="nav-item" onclick="nav('log')">
        <span class="icon">📝</span> 学习日志
      </div>
      <div class="nav-item" onclick="nav('ai')">
        <span class="icon">🤖</span> 导出给AI
      </div>
      <div class="nav-item" onclick="nav('settings')">
        <span class="icon">⚙</span> 设置
      </div>
    </div>
  </div>

  <div class="main">

    <!-- TODAY -->
    <div class="section active" id="sec-today">
      <div class="page-header">
        <div>
          <div class="page-title">今日任务</div>
          <div class="page-sub" id="today-date"></div>
        </div>
        <button class="btn primary" onclick="openAddModal()">＋ 添加错题</button>
      </div>
      <div class="stats-grid" id="today-stats"></div>
      <div id="today-content"></div>
    </div>

    <!-- MATH -->
    <div class="section" id="sec-math">
      <div id="math-list">
        <div class="page-header">
          <div>
            <div class="page-title">数学</div>
            <div class="page-sub">高数 · 线代 · 概率论</div>
          </div>
          <button class="btn" onclick="openAddChapterModal('math')">＋ 添加章节</button>
        </div>
        <div id="math-chapters-grid"></div>
      </div>
      <div id="math-detail" style="display:none"></div>
    </div>

    <!-- CS408 -->
    <div class="section" id="sec-cs408">
      <div id="cs408-list">
        <div class="page-header">
          <div>
            <div class="page-title">408</div>
            <div class="page-sub">数据结构 · 组成原理 · 操作系统 · 计算机网络</div>
          </div>
          <button class="btn" onclick="openAddChapterModal('cs408')">＋ 添加章节</button>
        </div>
        <div id="cs408-chapters-grid"></div>
      </div>
      <div id="cs408-detail" style="display:none"></div>
    </div>

    <!-- ANALYSIS -->
    <div class="section" id="sec-analysis">
      <div class="page-header">
        <div class="page-title">学习分析</div>
      </div>
      <div id="analysis-content"></div>
    </div>

    <!-- LOG -->
    <div class="section" id="sec-log">
      <div class="page-header">
        <div class="page-title">学习日志</div>
      </div>
      <div id="log-content"></div>
    </div>

    <!-- AI EXPORT -->
    <div class="section" id="sec-ai">
      <div class="page-header">
        <div>
          <div class="page-title">导出给AI</div>
          <div class="page-sub">将学习数据格式化，粘贴给Claude进行分析</div>
        </div>
        <button class="btn primary" onclick="copyExport()">复制全部</button>
      </div>
      <div class="card">
        <div style="margin-bottom:12px;font-size:13px;color:var(--text2)">直接将以下内容复制给Claude，AI会分析你的薄弱点和复习节奏：</div>
        <div class="export-box" id="export-content"></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="section" id="sec-settings">
      <div class="page-header">
        <div class="page-title">设置</div>
      </div>
      <div class="card" style="max-width:500px">
        <div style="font-size:14px;font-weight:500;margin-bottom:16px">遗忘曲线间隔（天）</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
          <div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:6px">第1次做对后</div>
            <input type="number" id="s-r1" min="1" max="30" style="width:100%">
          </div>
          <div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:6px">第2次做对后（稳定）</div>
            <input type="number" id="s-r2" min="1" max="60" style="width:100%">
          </div>
        </div>
        <button class="btn primary" onclick="saveSettings()">保存</button>
        <div class="divider"></div>
        <div style="font-size:14px;font-weight:500;margin-bottom:12px">数据管理</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn" onclick="exportData()">导出备份</button>
          <button class="btn" onclick="importData()">导入恢复</button>
          <button class="btn danger" onclick="clearAllData()">清空所有数据</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Add Error Modal -->
<div class="modal-bg" id="add-modal" style="display:none" onclick="closeModalBg(event)">
  <div class="modal fade-in">
    <div class="modal-title">添加错题</div>
    <div style="margin-bottom:10px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">选择章节</div>
      <select id="modal-chapter"></select>
    </div>
    <div class="form-row">
      <div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:6px">题号</div>
        <input id="modal-num" placeholder="如：P45-3 或 2023-Q12">
      </div>
      <div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:6px">错误类型</div>
        <select id="modal-type">
          <option value="思路">思路不清</option>
          <option value="计算">计算错误</option>
          <option value="概念">概念模糊</option>
          <option value="方法">方法选择</option>
          <option value="粗心">粗心</option>
          <option value="其他">其他</option>
        </select>
      </div>
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">错误原因（一句话）</div>
      <textarea id="modal-reason" placeholder="如：格林公式补线方向搞反了 / 漏了分段讨论"></textarea>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="saveNewError()">添加</button>
    </div>
  </div>
</div>

<!-- Add Chapter Modal -->
<div class="modal-bg" id="add-chapter-modal" style="display:none" onclick="closeModalBg(event)">
  <div class="modal fade-in">
    <div class="modal-title">添加章节</div>
    <div style="margin-bottom:10px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">章节名称</div>
      <input id="ch-name" placeholder="如：曲线积分">
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">所属科目</div>
      <input id="ch-sub" placeholder="如：高数 / 数据结构">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeChapterModal()">取消</button>
      <button class="btn primary" onclick="saveNewChapter()">添加</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const DEFAULT_MATH = [
  {id:'m1',name:'函数与极限',sub:'高数'},
  {id:'m2',name:'一元函数微分学',sub:'高数'},
  {id:'m3',name:'一元函数积分学',sub:'高数'},
  {id:'m4',name:'多元函数微分学',sub:'高数'},
  {id:'m5',name:'多元函数积分学',sub:'高数'},
  {id:'m6',name:'无穷级数',sub:'高数'},
  {id:'m7',name:'常微分方程',sub:'高数'},
  {id:'m8',name:'行列式与矩阵',sub:'线代'},
  {id:'m9',name:'向量与线性方程组',sub:'线代'},
  {id:'m10',name:'特征值与二次型',sub:'线代'},
  {id:'m11',name:'随机事件与概率',sub:'概率论'},
  {id:'m12',name:'随机变量及其分布',sub:'概率论'},
  {id:'m13',name:'数字特征与大数定律',sub:'概率论'},
  {id:'m14',name:'数理统计',sub:'概率论'},
];
const DEFAULT_CS = [
  {id:'c1',name:'线性表',sub:'数据结构'},
  {id:'c2',name:'栈、队列、数组',sub:'数据结构'},
  {id:'c3',name:'树与二叉树',sub:'数据结构'},
  {id:'c4',name:'图',sub:'数据结构'},
  {id:'c5',name:'查找',sub:'数据结构'},
  {id:'c6',name:'排序',sub:'数据结构'},
  {id:'c7',name:'数据的表示与运算',sub:'组成原理'},
  {id:'c8',name:'存储器层次结构',sub:'组成原理'},
  {id:'c9',name:'指令系统',sub:'组成原理'},
  {id:'c10',name:'中央处理器',sub:'组成原理'},
  {id:'c11',name:'总线与I/O系统',sub:'组成原理'},
  {id:'c12',name:'进程管理',sub:'操作系统'},
  {id:'c13',name:'内存管理',sub:'操作系统'},
  {id:'c14',name:'文件系统',sub:'操作系统'},
  {id:'c15',name:'I/O管理',sub:'操作系统'},
  {id:'c16',name:'计算机网络概述',sub:'计算机网络'},

// ─── UTILS ──────────────────────────────────────────────────────────────────

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toLocaleDateString('zh-CN'); }
function fmtDate(ts) { return new Date(ts).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'}); }
function fmtDateFull(ts) { return new Date(ts).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'}); }
function daysDiff(ts) { return Math.ceil((ts - Date.now()) / 86400000); }

function allChapters() {
  return [...S.mathChapters.map(c=>({...c,subject:'math'})), ...S.csChapters.map(c=>({...c,subject:'cs408'}))];
}

function getErrors(chId) { return S.errors[chId] || []; }

// Spaced repetition logic:
// - Track consecutive correct streak (resets on wrong)
// - streak=0: due immediately
// - streak=1: due after r1 days (default 3)
// - streak=2: due after r2 days (default 7) — "confirmed"
// - streak>=3: stable, no more review needed
// If wrong at any point: streak resets to 0, due immediately
function getStreak(err) {
  const reviews = err.reviews || [];
  let streak = 0;
  for (let i = reviews.length - 1; i >= 0; i--) {
    if (reviews[i].correct) streak++;
    else break;
  }
  return streak;
}

function getLastReviewTs(err) {
  const reviews = err.reviews || [];
  if (!reviews.length) return err.date;
  return reviews[reviews.length - 1].date;
}

function nextReviewTs(err) {
  if (isStable(err)) return null;
  const streak = getStreak(err);
  const lastTs = getLastReviewTs(err);
  if (streak === 0) return lastTs; // due now (just added or just got wrong)
  if (streak === 1) return lastTs + S.settings.r1 * 86400000; // 3 days after first correct
  if (streak === 2) return lastTs + S.settings.r2 * 86400000; // 7 days after second correct
  return null;
}

function isStable(err) {
  return getStreak(err) >= 3;
}

function getDueErrors() {
  const now = Date.now();
  const due = [];
  allChapters().forEach(ch => {
    (S.errors[ch.id] || []).forEach(err => {
      if (isStable(err)) return;
      const next = nextReviewTs(err);
      if (next && next <= now + 86400000) {
        due.push({...err, chId: ch.id, chName: ch.name, sub: ch.sub, nextTs: next});
      }
    });
  });
  return due.sort((a,b) => a.nextTs - b.nextTs);
}

function masteryOf(chId) {
  const errs = getErrors(chId);
  if (!errs.length) return {pct:0, label:'未开始', cls:'mastery-none'};
  const stable = errs.filter(isStable).length;
  const pct = Math.round(stable / errs.length * 100);
  if (pct === 100) return {pct, label:'已掌握', cls:'mastery-excellent'};
  if (pct >= 60)  return {pct, label:'基本掌握', cls:'mastery-good'};
  if (pct >= 30)  return {pct, label:'部分掌握', cls:'mastery-mid'};
  return {pct, label:'待攻克', cls:'mastery-low'};
}

function logAction(action, detail) {
  S.log.unshift({ date: Date.now(), action, detail });
  if (S.log.length > 200) S.log = S.log.slice(0, 200);
  save();
}

// ─── TODAY ───────────────────────────────────────────────────────────────────

function renderToday() {
  const now = new Date();
  document.getElementById('today-date').textContent = fmtDateFull(Date.now()) + ' · ' + ['日','一','二','三','四','五','六'][now.getDay()] ;

  const due = getDueErrors();
  const overdue = due.filter(e => daysDiff(e.nextTs) < 0);
  const todayDue = due.filter(e => daysDiff(e.nextTs) === 0);
  const soon = due.filter(e => daysDiff(e.nextTs) > 0);

  const badge = document.getElementById('today-badge');
  const urgentCount = overdue.length + todayDue.length;
  if (urgentCount > 0) {
    badge.style.display = '';
    badge.textContent = urgentCount;
  } else {
    badge.style.display = 'none';
  }

  const allErrs = allChapters().flatMap(c => (S.errors[c.id]||[]).map(e=>e));
  const totalErrs = allErrs.length;
  const stableErrs = allErrs.filter(isStable).length;
  const todayAdded = allErrs.filter(e => fmtDate(e.date) === fmtDate(Date.now())).length;
  const todaySolved = allErrs.flatMap(e=>(e.reviews||[]).filter(r=>fmtDate(r.date)===fmtDate(Date.now())&&r.correct)).length;

  document.getElementById('today-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-num" style="color:var(--red)">${urgentCount}</div>
      <div class="stat-label">待复习</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--accent2)">${totalErrs}</div>
      <div class="stat-label">总错题</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--green)">${stableErrs}</div>
      <div class="stat-label">已稳定掌握</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--amber)">${todaySolved}</div>
      <div class="stat-label">今日复习</div>
    </div>
  `;

  let html = '';

  if (due.length === 0) {
    html = `<div class="empty"><div class="empty-icon">✓</div>今日无待复习题目<br>去添加新的错题吧</div>`;
  } else {
    if (overdue.length || todayDue.length) {
      html += `<div style="font-size:12px;color:var(--text2);font-weight:500;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">需要复习 (${overdue.length+todayDue.length})</div>`;
      [...overdue, ...todayDue].forEach(e => {
        const d = daysDiff(e.nextTs);
        const tagCls = d < 0 ? 'due' : 'today';
        const tagText = d < 0 ? `逾期${Math.abs(d)}天` : '今天';
        html += reviewItemHtml(e, tagCls, tagText);
      });
    }
    if (soon.length) {
      html += `<div style="font-size:12px;color:var(--text2);font-weight:500;margin:16px 0 8px;text-transform:uppercase;letter-spacing:0.5px">即将到期 (${soon.length})</div>`;
      soon.forEach(e => {
        const d = daysDiff(e.nextTs);
        html += reviewItemHtml(e, 'soon', `${d}天后`);
      });
    }
  }

  document.getElementById('today-content').innerHTML = html;
}

function reviewItemHtml(e, tagCls, tagText) {
  const streak = getStreak(e);
  const streakDots = [0,1,2].map(i=>`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${i<streak?'var(--green)':'var(--bg4)'};margin-right:3px"></span>`).join('');
  return `<div class="review-item" id="ri-${e.id}">
    <div class="ri-left">
      <div class="ri-num">
        <span style="margin-right:6px">${e.num}</span>
        <span class="tag type">${e.type}</span>
      </div>
      <div class="ri-reason">${e.reason||'未填写原因'}</div>
      <div class="ri-meta" style="display:flex;align-items:center;gap:8px">
        <span>${e.chName} · ${e.sub} · ${fmtDate(e.date)}</span>
        <span style="display:flex;align-items:center;gap:2px" title="连续做对次数（3次稳定）">${streakDots}<span style="font-size:11px;color:var(--text3)">${streak}/3</span></span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
      <span class="tag ${tagCls}">${tagText}</span>
      <div class="ri-actions">
        <button class="btn sm success" onclick="reviewResult('${e.chId}','${e.id}',true)">✓ 做对了</button>
        <button class="btn sm danger" onclick="reviewResult('${e.chId}','${e.id}',false)">✗ 还不会</button>
      </div>
    </div>
  </div>`;
}

function reviewResult(chId, errId, correct) {
  const errs = S.errors[chId];
  if (!errs) return;
  const err = errs.find(e=>e.id===errId);
  if (!err) return;
  if (!err.reviews) err.reviews = [];
  err.reviews.push({ date: Date.now(), correct });
  const streak = getStreak(err);
  const stable = isStable(err);
  let action = '';
  if (!correct) {
    action = '做错了，重置进度';
  } else if (stable) {
    action = `做对了，已稳定掌握（连续${streak}次）`;
  } else {
    const next = S.settings[streak===1?'r1':'r2'];
    action = `做对了（连续${streak}次），${next}天后再复习`;
  }
  logAction('复习错题', `${err.num} [${err.type}] — ${action}`);
  save();
  // Show brief feedback then refresh
  const item = document.getElementById('ri-'+errId);
  if (item) {
    const fb = document.createElement('div');
    fb.style.cssText = `font-size:12px;color:${correct?'var(--green)':'var(--red)'};padding:4px 0;`;
    fb.textContent = action;
    item.querySelector('.ri-left').appendChild(fb);
    setTimeout(()=>{ item.style.transition='opacity 0.3s'; item.style.opacity='0'; }, 800);
    setTimeout(()=>renderToday(), 1100);
  } else {
    renderToday();
  }
}

function renderChapterErrors(chId) {
  const errs = getErrors(chId);
  const el = document.getElementById('ch-error-list');
  if (!el) return;
  if (!errs.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">✓</div>暂无错题</div>'; return; }

  el.innerHTML = [...errs].reverse().map(e => {
    const stable = isStable(e);
    const streak = getStreak(e);
    const streakDots = [0,1,2].map(i=>`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${i<streak?'var(--green)':'var(--bg4)'};margin-right:2px"></span>`).join('');
    const next = nextReviewTs(e);
    const nextStr = stable ? '已稳定' : next ? (daysDiff(next) <= 0 ? '待复习' : `${daysDiff(next)}天后`) : '今日';
    return `<div class="review-item" style="${stable?'opacity:0.55':''}">
      <div class="ri-left">
        <div class="ri-num">
          <span style="margin-right:6px">${e.num}</span>
          <span class="tag type">${e.type}</span>
          ${stable ? '<span class="tag stable" style="margin-left:4px">已稳定</span>' : ''}
        </div>
        <div class="ri-reason">${e.reason||''}</div>
        <div class="ri-meta" style="display:flex;align-items:center;gap:8px">
          <span>添加 ${fmtDate(e.date)} · 下次: ${nextStr}</span>
          <span style="display:flex;align-items:center;gap:2px">${streakDots}<span style="font-size:11px;color:var(--text3)">${streak}/3</span></span>
        </div>
      </div>
      <div class="ri-actions">
        <button class="btn sm danger" onclick="deleteError('${chId}','${e.id}')">删</button>
      </div>
    </div>`;
  }).join('');
}

function addErrorInChapter(subject, chId) {
  const num = document.getElementById('ch-err-num').value.trim();
  const reason = document.getElementById('ch-err-reason').value.trim();
  const type = document.getElementById('ch-err-type').value;
  if (!num) { alert('请填写题号'); return; }
  if (!S.errors[chId]) S.errors[chId] = [];
  const err = { id: uid(), num, reason, type, date: Date.now(), reviews: [] };
  S.errors[chId].push(err);
  logAction('添加错题', `${num} (${type}) — ${chId}`);
  save();
  document.getElementById('ch-err-num').value = '';
  document.getElementById('ch-err-reason').value = '';
  renderChapterErrors(chId);
  const chapters = subject === 'math' ? S.mathChapters : S.csChapters;
  const ch = chapters.find(c=>c.id===chId);
  const m = masteryOf(chId);
  const stable = S.errors[chId].filter(isStable).length;
}

function deleteError(chId, errId) {
  if (!confirm('删除这道错题？')) return;
  S.errors[chId] = (S.errors[chId]||[]).filter(e=>e.id!==errId);
  logAction('删除错题', errId);
  save();
  renderChapterErrors(chId);
}

function closeDetail(subject) {
  document.getElementById(subject+'-detail').style.display = 'none';
  document.getElementById(subject+'-list').style.display = 'block';
  renderChapters(subject);
}

function deleteChapter(subject, chId) {
  if (!confirm('删除此章节及其所有错题？')) return;
  if (subject === 'math') S.mathChapters = S.mathChapters.filter(c=>c.id!==chId);
  else S.csChapters = S.csChapters.filter(c=>c.id!==chId);
  delete S.errors[chId];
  logAction('删除章节', chId);
  save();
  closeDetail(subject);
}

function editChapter(subject, chId) {
  const chapters = subject === 'math' ? S.mathChapters : S.csChapters;
  const ch = chapters.find(c=>c.id===chId);
  if (!ch) return;
  const newName = prompt('章节名称', ch.name);
  if (newName === null) return;
  const newSub = prompt('所属科目', ch.sub);
  if (newSub === null) return;
  ch.name = newName.trim() || ch.name;
  ch.sub = newSub.trim() || ch.sub;
  logAction('编辑章节', `${ch.name}`);
  save();
  renderChapterDetail(subject, chId, ch);
}

  const ch = { id: uid(), name, sub: sub || '自定义' };
  if (S._addChapterTarget === 'math') S.mathChapters.push(ch);
  else S.csChapters.push(ch);
  logAction('添加章节', name);
  save();
  closeChapterModal();
  renderChapters(S._addChapterTarget);
}

// ─── ANALYSIS ────────────────────────────────────────────────────────────────

function renderAnalysis() {
  const allCh = allChapters();
  const allErrs = allCh.flatMap(c => (S.errors[c.id]||[]).map(e=>({...e, chName:c.name, sub:c.sub})));

  // Weakest chapters
  const chData = allCh.map(c => {
    const errs = getErrors(c.id);
    const m = masteryOf(c.id);
    return { ...c, errs:errs.length, stable:errs.filter(isStable).length, pct:m.pct };
  }).filter(c=>c.errs>0).sort((a,b)=>a.pct-b.pct);

  // Error type distribution
  const typeDist = {};
  allErrs.forEach(e=>{ typeDist[e.type]=(typeDist[e.type]||0)+1; });

  let html = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
      <div class="card">
        <div style="font-size:14px;font-weight:500;margin-bottom:16px">章节掌握热力图</div>
        <div class="heatmap">
          ${chData.length ? chData.map(c => {
            const color = c.pct===100?'var(--green)':c.pct>=60?'var(--blue)':c.pct>=30?'var(--amber)':'var(--red)';
            return `<div class="hm-row">
              <div class="hm-label" title="${c.sub}·${c.name}">${c.name}</div>
              <div class="hm-bar-wrap">
                <div class="progress-wrap">
                  <div class="progress-fill" style="width:${c.pct}%;background:${color}"></div>
                </div>
              </div>
              <div class="hm-count">${c.errs}</div>
            </div>`;
          }).join('') : '<div class="empty">暂无数据</div>'}
        </div>
      </div>
      <div class="card">
        <div style="font-size:14px;font-weight:500;margin-bottom:16px">错误类型分布</div>
        ${Object.keys(typeDist).length ? Object.entries(typeDist).sort((a,b)=>b[1]-a[1]).map(([type,count])=>{
          const total = allErrs.length;
          const pct = Math.round(count/total*100);
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
              <span>${type}</span>
              <span style="color:var(--text2)">${count}题 · ${pct}%</span>
            </div>
            <div class="progress-wrap">
              <div class="progress-fill" style="width:${pct}%;background:var(--accent)"></div>
            </div>
          </div>`;
        }).join('') : '<div class="empty">暂无数据</div>'}
      </div>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:500;margin-bottom:16px">薄弱章节（掌握度最低）</div>
      ${chData.slice(0,5).length ? chData.slice(0,5).map(c=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-size:14px">${c.name}</div>
            <div style="font-size:12px;color:var(--text2)">${c.sub} · ${c.errs}题 · ${c.stable}稳定</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:18px;font-weight:700;color:${c.pct<30?'var(--red)':c.pct<60?'var(--amber)':'var(--blue)'}">${c.pct}%</div>
          </div>
        </div>
      `).join('') : '<div class="empty">暂无数据</div>'}
    </div>
  `;
  document.getElementById('analysis-content').innerHTML = html;
}

// ─── LOG ─────────────────────────────────────────────────────────────────────

function renderLog() {
  const el = document.getElementById('log-content');
  if (!S.log.length) {
    el.innerHTML = '<div class="card"><div class="empty"><div class="empty-icon">📝</div>暂无记录</div></div>';
    return;
  }
  el.innerHTML = `<div class="card">` + S.log.slice(0,100).map(l=>`
    <div class="log-item">
      <div class="log-date">${fmtDate(l.date)}</div>
      <div class="log-text"><span style="color:var(--accent2)">${l.action}</span> · ${l.detail}</div>
    </div>
  `).join('') + '</div>';
}

// ─── AI EXPORT ───────────────────────────────────────────────────────────────

function renderAI() {
  document.getElementById('export-content').textContent = generateExport();
}

function generateExport() {
  const lines = [];
  lines.push('=== 考研错题追踪器数据报告 ===');
  lines.push(`导出时间：${fmtDateFull(Date.now())}`);
  lines.push('');

  const allErrs = allChapters().flatMap(c=>(S.errors[c.id]||[]).map(e=>e));
  const stableCount = allErrs.filter(isStable).length;
  lines.push(`总错题数：${allErrs.length}　已稳定掌握：${stableCount}　待解决：${allErrs.length-stableCount}`);
  lines.push('');

  lines.push('--- 数学各章节 ---');
  S.mathChapters.forEach(c => {
    const errs = getErrors(c.id);
    if (!errs.length) return;
    const m = masteryOf(c.id);
    lines.push(`【${c.sub}·${c.name}】掌握度${m.pct}% | 错题${errs.length}道 | 稳定${errs.filter(isStable).length}道`);
    errs.forEach(e => {
      const stable = isStable(e);
      const reviews = e.reviews||[];
      lines.push(`  ${e.num} [${e.type}] ${e.reason||''} ${stable?'✓稳定':''}（复习${reviews.length}次）`);
    });
  });
  lines.push('');
  lines.push('--- 408各章节 ---');
  S.csChapters.forEach(c => {
    const errs = getErrors(c.id);
    if (!errs.length) return;
    const m = masteryOf(c.id);
    lines.push(`【${c.sub}·${c.name}】掌握度${m.pct}% | 错题${errs.length}道 | 稳定${errs.filter(isStable).length}道`);
    errs.forEach(e => {
      const stable = isStable(e);
      const reviews = e.reviews||[];
      lines.push(`  ${e.num} [${e.type}] ${e.reason||''} ${stable?'✓稳定':''}（复习${reviews.length}次）`);
    });
  });
  lines.push('');
  lines.push('--- 近期学习记录 ---');
  S.log.slice(0,20).forEach(l => {
    lines.push(`${fmtDate(l.date)} ${l.action}：${l.detail}`);
  });
  lines.push('');
  lines.push('请根据以上数据分析我的学习情况，重点指出：1.哪些章节是真正的薄弱点 2.复习节奏是否合理 3.错误类型有什么规律 4.下一步建议');
  return lines.join('\n');
}

function copyExport() {
  const text = generateExport();
  navigator.clipboard.writeText(text).then(()=>alert('已复制到剪贴板，直接粘贴给Claude即可')).catch(()=>{
    const el = document.getElementById('export-content');
    el.select && el.select();
    alert('请手动选中文本复制');
  });
}

// ─── SETTINGS ────────────────────────────────────────────────────────────────

function renderSettings() {
  document.getElementById('s-r1').value = S.settings.r1;
  document.getElementById('s-r2').value = S.settings.r2;
}

function saveSettings() {
  S.settings.r1 = parseInt(document.getElementById('s-r1').value) || 3;
  S.settings.r2 = parseInt(document.getElementById('s-r2').value) || 7;
  save();
  alert('已保存');
}

function exportData() {
  const json = JSON.stringify(S, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `考研备份_${today()}.json`;
  a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const f = e.target.files[0];
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (confirm('导入将覆盖当前所有数据，确认？')) {
          S = d;
          save();
          nav('today');
          alert('导入成功');
        }
      } catch { alert('文件格式错误'); }
    };
    r.readAsText(f);
  };
  input.click();
}

function clearAllData() {
  if (confirm('清空所有数据？此操作不可恢复') && confirm('再次确认：清空所有错题和记录？')) {
    S.errors = {};
    S.log = [];
    S.mathChapters = JSON.parse(JSON.stringify(DEFAULT_MATH));
    S.csChapters = JSON.parse(JSON.stringify(DEFAULT_CS));
    save();
    nav('today');
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────

renderToday();
</script>
